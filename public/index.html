<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a2a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Cartes en Famille</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ACCUEIL -->
<div id="screen-home" class="screen active">
  <div class="logo-title">Cartes<br>en Famille</div>
  <div class="logo-suits"><span class="b">♠</span> <span class="r">♥</span> <span class="r">♦</span> <span class="b">♣</span></div>
  <div class="logo-sub">Belote · Coinche · Tarot</div>
  <div class="home-panel">
    <div class="panel-title">Nouvelle Partie</div>
    <div class="form-group">
      <label>Votre prénom</label>
      <input type="text" id="inp-name" placeholder="Ex: Papa" maxlength="15" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Jeu</label>
      <div class="seg" id="seg-game">
        <button class="seg-btn on" data-game="belote">Belote</button>
        <button class="seg-btn" data-game="coinche">Coinche</button>
        <button class="seg-btn" data-game="tarot">Tarot</button>
      </div>
    </div>
    <div class="form-group" id="players-fg">
      <label>Joueurs</label>
      <div class="seg" id="seg-players">
        <button class="seg-btn on" data-n="4">4</button>
      </div>
    </div>
    <div class="form-group" id="target-score-group">
      <label>Score pour gagner la partie</label>
      <input type="number" id="inp-target" placeholder="501" min="100" max="9999" style="width:100%;padding:0.55rem 0.85rem;background:rgba(0,0,0,0.3);border:1px solid rgba(201,168,76,0.35);border-radius:var(--r);color:var(--cream);font-family:inherit;font-size:1rem">
    </div>
    <div class="form-group">
      <div class="check-row">
        <input type="checkbox" id="chk-ai" checked>
        <label for="chk-ai">Remplir les places vides avec des IA</label>
      </div>
    </div>
    <button class="btn-primary" id="btn-create">Créer la partie</button>
    <div class="divider">ou rejoindre une partie existante</div>
    <div class="join-row">
      <input type="text" id="inp-code" placeholder="CODE" maxlength="6">
      <button class="btn-sec" id="btn-join">Rejoindre</button>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="screen-lobby" class="screen">
  <div class="lobby-box">
    <div class="room-code">
      <div class="rc-label">Code de la salle</div>
      <div class="rc-value" id="lobby-code">——</div>
      <div class="rc-hint">Partagez ce code avec vos proches</div>
    </div>
    <div style="text-align:center;margin-bottom:0.8rem">
      <span id="lobby-badge" style="font-size:0.82rem;color:var(--gold-light);opacity:0.8"></span>
    </div>
    <div class="slot-list" id="slot-list"></div>
    <div class="lobby-btns" id="lobby-btns">
      <button class="btn-sec" id="btn-add-ai">+ Ajouter une IA</button>
      <button class="btn-primary" id="btn-start">Démarrer ▶</button>
    </div>
    <div style="text-align:center;margin-top:0.7rem">
      <button class="btn-sec" style="font-size:0.8rem" id="btn-back">← Retour</button>
    </div>
  </div>
  <div style="font-size:0.85rem;color:rgba(245,240,232,0.4);font-style:italic;text-align:center;margin-top:0.5rem">
    En attente des joueurs…
  </div>
</div>

<!-- JEU -->
<div id="screen-game" class="screen">
  <div class="game-table">

    <!-- Header scores -->
    <div class="g-header">
      <span class="g-title" id="g-title">Belote</span>
      <div class="g-scores" id="g-scores">
        <div class="g-score-item">
          <span class="g-score-label">NS</span>
          <span class="g-score-val ns" id="sc-ns">0</span>
        </div>
        <div class="g-score-item">
          <span class="g-score-label">EO</span>
          <span class="g-score-val eo" id="sc-eo">0</span>
        </div>
      </div>
      <button class="g-menu" id="btn-gmenu">⋮</button>
    </div>

    <!-- Phase / tour / info contrat -->
    <div class="g-phase" id="g-phase">En attente…</div>

    <!-- Zone centrale -->
    <div class="center-area">
      <!-- Adversaires en haut -->
      <div class="opponents" id="opponents"></div>

      <!-- Mon rôle (tarot) -->
      <div id="my-role-badge" style="display:none;text-align:center;margin:0.2rem 0"></div>

      <!-- Dernier pli -->
      <div class="last-trick-bar" id="last-trick-bar" style="display:none">
        <span>Dernier pli :</span>
        <div class="last-trick-cards" id="last-trick-cards"></div>
        <span id="last-trick-who" style="font-style:italic;color:var(--gold-light)"></span>
      </div>

      <!-- Pli en cours — centré -->
      <div class="trick-zone">
        <div class="played-cards" id="played-cards"></div>
      </div>

      <!-- Chien tarot -->
      <div class="dog-zone" id="dog-zone"></div>
    </div>

    <!-- Enchères / écart -->
    <div class="bid-panel" id="bid-panel">
      <div class="bid-panel-title" id="bid-panel-title">Enchères</div>
      <div class="bid-buttons" id="bid-buttons"></div>
    </div>

    <!-- Ma main -->
    <div class="my-hand-zone">
      <div class="my-hand-label">Votre main</div>
      <div class="my-hand" id="my-hand"></div>
    </div>

  </div>
</div>

<!-- MODALE -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="m-title">Manche terminée</div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-actions">
      <button class="btn-sec" id="btn-m-quit">Quitter</button>
      <button class="btn-primary" id="btn-m-again">Nouvelle manche ▶</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
<script src="/js/game.js"></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
</script>
</body>
</html>
